name: Release

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify CI passed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESULT=$(gh run list --workflow=ci.yml --branch=main --commit=${{ github.sha }} --status=success --limit=1 --json conclusion -q '.[0].conclusion')
          if [ "$RESULT" != "success" ]; then
            echo "::error::CI has not passed for commit ${{ github.sha }}. Aborting release."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Check for new release
        id: check
        run: |
          if [ -f .release-version ]; then
            VERSION=$(cat .release-version)
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "Released version: $VERSION"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No new release"
          fi

      - name: Log in to GHCR
        if: steps.check.outputs.released == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.released == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push standalone image
        if: steps.check.outputs.released == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ffmpeg-rest-standalone:${{ steps.check.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ffmpeg-rest-standalone:latest

      - name: Build and push server image
        if: steps.check.outputs.released == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ffmpeg-rest-server:${{ steps.check.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ffmpeg-rest-server:latest

      - name: Build and push worker image
        if: steps.check.outputs.released == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ffmpeg-rest-worker:${{ steps.check.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ffmpeg-rest-worker:latest

      - name: Build and push web image
        if: steps.check.outputs.released == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ffmpeg-rest-web:${{ steps.check.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/ffmpeg-rest-web:latest
